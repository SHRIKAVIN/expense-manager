<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0066cc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Expense Manager</title>
    <script>
      // Persist theme before first paint to avoid a flash of the wrong theme (§5.5).
      // The resolved theme is recomputed per-user after auth; this is the pre-auth guard.
      (function () {
        try {
          var pref = localStorage.getItem("em.theme.lastResolved");
          if (pref !== "light" && pref !== "dark") {
            pref = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", pref);
        } catch (e) {
          /* no-op */
        }
      })();
      // Seed the real viewport height before first paint. iOS standalone PWAs
      // report a stale height for fixed/100% boxes after relaunch, which floats
      // the bottom nav up; we pin the shell to this measured value instead.
      (function () {
        try {
          document.documentElement.style.setProperty(
            "--app-height",
            window.innerHeight + "px",
          );
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
